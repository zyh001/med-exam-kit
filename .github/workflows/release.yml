name: Release

on:
  push:
    tags:
      - 'v*-go'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: go test ./internal/...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ──────────────────────────────────────
          - goos: linux
            goarch: amd64
            artifact: med-exam-linux-amd64
          - goos: linux
            goarch: arm64
            artifact: med-exam-linux-arm64
          - goos: linux
            goarch: arm
            goarm: 7
            artifact: med-exam-linux-armv7
          - goos: linux
            goarch: "386"
            artifact: med-exam-linux-386
          - goos: linux
            goarch: loong64
            artifact: med-exam-linux-loong64
          # ── macOS ──────────────────────────────────────
          - goos: darwin
            goarch: amd64
            artifact: med-exam-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact: med-exam-darwin-arm64
          # ── Windows ────────────────────────────────────
          - goos: windows
            goarch: amd64
            artifact: med-exam-windows-amd64.exe
          - goos: windows
            goarch: arm64
            artifact: med-exam-windows-arm64.exe
          - goos: windows
            goarch: "386"
            artifact: med-exam-windows-386.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Upgrade sqlite (fixes loong64 + windows/386)
        run: |
          go get modernc.org/sqlite@latest
          go mod tidy
        env:
          GOFLAGS: '-mod=mod'

      - name: Build
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm || '' }}
        run: go build -ldflags="-s -w" -o ${{ matrix.artifact }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}