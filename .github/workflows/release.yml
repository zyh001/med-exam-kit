name: Release

on:
  push:
    tags:
      - 'v*-go'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        run: go test ./internal/...

  build:
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: med-exam-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: 386
            artifact: med-exam-linux-386
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact: med-exam-linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact: med-exam-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: med-exam-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: 386
            artifact: med-exam-windows-386.exe
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: med-exam-windows-amd64.exe
          - os: windows-latest
            goos: windows
            goarch: arm64
            artifact: med-exam-windows-arm64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install cross-compilers
        if: matrix.goarch == '386' || matrix.goarch == 'arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib gcc-aarch64-linux-gnu

      - name: Build
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w" -o ${{ matrix.artifact }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
