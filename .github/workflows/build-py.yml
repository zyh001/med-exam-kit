name: Build · Python (main)

# 触发规则：
#   v1.0.0-py  → 只触发本 workflow
#   v1.0.0     → 与 Go workflow 同步触发（双分支统一发版）
on:
  push:
    tags:
      - 'v*-py'
      - 'v[0-9]*.[0-9]*.[0-9]*'   # 纯版本号 tag，如 v1.2.3
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch / tag / SHA to build'
        default: 'main'
        required: false

permissions:
  contents: write

env:
  PYTHON_VERSION: '3.12'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_suffix: windows-amd64.exe
          - os: macos-latest
            artifact_suffix: darwin-arm64
          - os: ubuntu-latest
            artifact_suffix: linux-amd64

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main   # 始终从 main 分支构建，与 tag 落点无关

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Determine version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --onefile --noconfirm \
            --name "med-exam-kit" \
            --add-data "src/med_exam_toolkit/templates:templates" \
            --add-data "src/med_exam_toolkit/static:static" \
            --console \
            --hidden-import click \
            --hidden-import openpyxl \
            --hidden-import docx \
            --hidden-import reportlab \
            --hidden-import cryptography \
            --hidden-import sqlalchemy \
            --hidden-import yaml \
            --hidden-import openai \
            --hidden-import flask \
            --hidden-import flask_compress \
            --hidden-import tqdm \
            --hidden-import termcolor \
            --hidden-import lxml \
            src/med_exam_toolkit/cli.py

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile --noconfirm `
            --name "med-exam-kit" `
            --add-data "src/med_exam_toolkit/templates;templates" `
            --add-data "src/med_exam_toolkit/static;static" `
            --console `
            --hidden-import click `
            --hidden-import openpyxl `
            --hidden-import docx `
            --hidden-import reportlab `
            --hidden-import cryptography `
            --hidden-import sqlalchemy `
            --hidden-import yaml `
            --hidden-import openai `
            --hidden-import flask `
            --hidden-import flask_compress `
            --hidden-import tqdm `
            --hidden-import termcolor `
            --hidden-import lxml `
            src/med_exam_toolkit/cli.py

      - name: Stage artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          OUT="dist/med-exam-kit-py-${{ steps.ver.outputs.version }}-${{ matrix.artifact_suffix }}"
          mv dist/med-exam-kit "$OUT"
          chmod +x "$OUT"

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mv dist/med-exam-kit.exe \
            "dist/med-exam-kit-py-${{ steps.ver.outputs.version }}-${{ matrix.artifact_suffix }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: py-${{ matrix.os }}
          path: dist/med-exam-kit-py-*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create / Update Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
