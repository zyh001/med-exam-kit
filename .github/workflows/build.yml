name: Build Executables

on:
  push:
    tags:
      - 'v*-py'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_suffix: windows.exe
          - os: macos-latest
            artifact_suffix: macos
          - os: ubuntu-latest
            artifact_suffix: linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Build with PyInstaller (Unix)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --onefile --noconfirm \
            --name "med-exam-kit" \
            --add-data "src/med_exam_toolkit/templates:templates" \
            --add-data "src/med_exam_toolkit/static:static" \
            --console \
            --hidden-import click \
            --hidden-import openpyxl \
            --hidden-import docx \
            --hidden-import reportlab \
            --hidden-import cryptography \
            --hidden-import sqlalchemy \
            --hidden-import yaml \
            --hidden-import openai \
            --hidden-import flask \
            --hidden-import flask_compress \
            --hidden-import tqdm \
            --hidden-import termcolor \
            --hidden-import lxml \
            src/med_exam_toolkit/cli.py

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile --noconfirm `
            --name "med-exam-kit" `
            --add-data "src/med_exam_toolkit/templates;templates" `
            --add-data "src/med_exam_toolkit/static;static" `
            --console `
            --hidden-import click `
            --hidden-import openpyxl `
            --hidden-import docx `
            --hidden-import reportlab `
            --hidden-import cryptography `
            --hidden-import sqlalchemy `
            --hidden-import yaml `
            --hidden-import openai `
            --hidden-import flask `
            --hidden-import flask_compress `
            --hidden-import tqdm `
            --hidden-import termcolor `
            --hidden-import lxml `
            src/med_exam_toolkit/cli.py

      - name: Rename and stage artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          OUT="dist/med-exam-kit-${{ steps.version.outputs.version }}-${{ matrix.artifact_suffix }}"
          mv dist/med-exam-kit "$OUT"
          chmod +x "$OUT"

      - name: Rename and stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mv dist/med-exam-kit.exe \
            "dist/med-exam-kit-${{ steps.version.outputs.version }}-${{ matrix.artifact_suffix }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: med-exam-kit-${{ matrix.os }}
          path: dist/med-exam-kit-*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}