name: Build Executables

on:
  push:
    tags:
      - 'v*-py'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: med-exam-kit
            executable_name: med-exam-kit.exe
            pyinstaller_args: --onefile --noconfirm
          - os: macos-latest
            artifact_name: med-exam-kit
            executable_name: med-exam-kit
            pyinstaller_args: --onefile --noconfirm
          - os: ubuntu-latest
            artifact_name: med-exam-kit
            executable_name: med-exam-kit
            pyinstaller_args: --onefile --noconfirm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller ${{ matrix.pyinstaller_args }} \
            --name "${{ matrix.artifact_name }}" \
            --add-data "src/med_exam_toolkit/templates;templates" \
            --add-data "src/med_exam_toolkit/static;static" \
            --console \
            --hidden-import click \
            --hidden-import openpyxl \
            --hidden-import docx \
            --hidden-import reportlab \
            --hidden-import cryptography \
            --hidden-import sqlalchemy \
            --hidden-import yaml \
            --hidden-import openai \
            --hidden-import flask \
            --hidden-import flask_compress \
            --hidden-import tqdm \
            --hidden-import termcolor \
            --hidden-import lxml \
            src/med_exam_toolkit/cli.py

      - name: Rename artifact with version
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            mv dist/${{ matrix.artifact_name }}/${{ matrix.executable_name }} "dist/med-exam-kit-${VERSION}-windows.exe"
          else
            mv dist/${{ matrix.artifact_name }}/${{ matrix.executable_name }} "dist/med-exam-kit-${VERSION}-${{ matrix.os == 'macos-latest' && 'macos' || 'linux' }}"
            chmod +x "dist/med-exam-kit-${VERSION}-${{ matrix.os == 'macos-latest' && 'macos' || 'linux' }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: med-exam-kit-${{ matrix.os }}
          path: dist/med-exam-kit-*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
